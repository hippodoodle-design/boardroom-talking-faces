<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f1d1b" />
<link rel="icon" type="image/png" href="favicon-32.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>The Hippo Round Table — Board Meeting</title>
<style>
  :root{ --green:#39d07e; --gold:#ffd27a; --wood:#4a3420; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ margin:0; color:#2a2118; overflow:hidden;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif; line-height:1.45; }

  /* ---- the room ---------------------------------------------------------- */
  .room{ position:relative; min-height:100%; height:100%; display:flex; flex-direction:column; }
  /* warm curved watercolour boardroom: overhead light + curved tan walls */
  .bg{ position:fixed; inset:0; z-index:0;
       background:
         radial-gradient(120% 70% at 50% 4%, rgba(255,248,228,.6), rgba(255,248,228,0) 52%),
         radial-gradient(150% 125% at 50% 38%, #efe0c4 0%, #ddc69e 44%, #b6976c 76%, #8c6c46 100%); }
  /* a hint of bookshelves down the two side walls */
  .bg::before{ content:""; position:absolute; inset:0;
       background:repeating-linear-gradient(90deg, rgba(60,40,20,0) 0 7px, rgba(58,38,18,.16) 7px 9px),
                  repeating-linear-gradient(0deg, rgba(40,26,12,.12) 0 34px, rgba(40,26,12,0) 34px 40px);
       -webkit-mask:linear-gradient(90deg,#000 0 12%,transparent 24% 76%,#000 88% 100%);
               mask:linear-gradient(90deg,#000 0 12%,transparent 24% 76%,#000 88% 100%);
       opacity:.55; }
  /* the wood table in the foreground */
  .bg::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:26%;
       background:
         radial-gradient(120% 90% at 50% 0%, rgba(255,232,196,.22), rgba(60,38,18,.0) 60%),
         linear-gradient(180deg,#bd884f 0%, #9c6c3b 42%, #7c5230 100%);
       border-top:2px solid rgba(255,232,196,.3);
       box-shadow:inset 0 10px 26px rgba(255,236,205,.16); }

  /* ---- banner plaque ----------------------------------------------------- */
  .banner{ position:relative; z-index:1; text-align:center; padding:10px 12px 2px; }
  .plaque{ display:inline-block; padding:7px 28px; border-radius:14px;
           background:linear-gradient(#f8eed3,#ecdcb3); color:#5b3d22;
           border:3px solid #6e4a28;
           box-shadow:0 7px 18px rgba(40,25,10,.4), inset 0 1px 0 rgba(255,255,255,.55);
           font-family:Georgia,"Times New Roman",serif; }
  .plaque .t{ font-size:clamp(18px,4.6vw,30px); font-weight:700; }
  .plaque .s{ font-size:clamp(11px,2.6vw,14px); color:#7a5a34; margin-top:1px; letter-spacing:.04em; }
  .status{ position:relative; z-index:1; text-align:center; color:#5a4326; font-size:12.5px;
           min-height:17px; padding:4px 14px 0; text-shadow:0 1px 0 rgba(255,250,235,.5); }
  .runrow{ position:relative; z-index:1; text-align:center; padding:6px 0 2px; }
  .run{ background:#5b7b4e; color:#fff; border:none; border-radius:999px; padding:9px 20px;
        font-size:14px; font-weight:650; cursor:pointer; box-shadow:0 4px 12px rgba(40,55,30,.35); }
  .run:disabled{ opacity:.55; }
  .bar{ position:relative; z-index:1; height:5px; width:min(360px,72vw); margin:7px auto 0;
        background:rgba(70,48,24,.22); border-radius:6px; overflow:hidden; display:none; }
  .bar > i{ display:block; height:100%; width:0; background:#5b7b4e; transition:width .2s; }

  /* ---- the framed video-tiles ------------------------------------------- */
  .stage{ position:relative; z-index:1; flex:1; overflow:auto; -webkit-overflow-scrolling:touch;
          padding:8px 12px 14px; }
  .tiles{ max-width:1180px; margin:0 auto; display:grid; gap:10px;
          grid-template-columns:repeat(2,1fr); }
  @media(min-width:520px){ .tiles{ grid-template-columns:repeat(3,1fr); } }
  @media(min-width:800px){ .tiles{ grid-template-columns:repeat(4,1fr); } }
  @media(min-width:1060px){ .tiles{ grid-template-columns:repeat(6,1fr); } }
  .tile{ cursor:pointer; }
  .frame{ position:relative; aspect-ratio:1/1; border-radius:12px; overflow:hidden;
          border:3px solid var(--wood); background:#2a2018;
          box-shadow:0 6px 15px rgba(18,11,4,.42), inset 0 0 0 2px rgba(255,226,182,.12);
          transition:box-shadow .15s, transform .12s; }
  .tile:active .frame{ transform:scale(.98); }
  .frame canvas{ width:100%; height:100%; display:block; object-fit:cover; object-position:center 30%; background:#efeadf; }
  .cap{ position:absolute; left:0; right:0; bottom:0; display:flex; align-items:center; gap:6px;
        padding:14px 8px 5px; color:#fff;
        background:linear-gradient(transparent, rgba(14,10,6,.88) 46%); }
  .cap .mic{ width:9px; height:9px; border-radius:50%; background:var(--green); flex:none;
             box-shadow:0 0 6px rgba(57,208,126,.85); }
  .cap .txt{ min-width:0; display:block; overflow:hidden; }
  .cap .nm{ display:block; font-weight:650; font-size:12.5px; line-height:1.15; }
  .cap .rl{ display:block; color:#dcd2c2; font-size:10px; line-height:1.15; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tile.on .frame{ box-shadow:0 0 0 3px rgba(255,210,120,.95), 0 8px 22px rgba(18,11,4,.55); }
  .tile.live .frame{ animation:liveglow 1.1s ease-in-out infinite; }
  @keyframes liveglow{ 0%,100%{ box-shadow:0 0 0 2px var(--green), 0 8px 22px rgba(18,11,4,.5);}
                       50%{ box-shadow:0 0 0 6px rgba(57,208,126,.55), 0 8px 22px rgba(18,11,4,.5);} }
  .tile.you .cap .mic{ background:var(--green); }
  .badge{ position:absolute; top:6px; left:6px; z-index:2; font-size:9.5px; font-weight:600;
          padding:2px 7px; border-radius:999px; background:rgba(47,107,70,.92); color:#fff; }
  .badge.standin{ background:rgba(122,90,40,.92); }

  /* ---- Zoom-style meeting toolbar --------------------------------------- */
  .toolbar{ position:relative; z-index:2; display:flex; align-items:center; gap:6px;
            padding:7px 10px calc(7px + env(safe-area-inset-bottom)); background:#201e1c;
            border-top:1px solid #000; box-shadow:0 -6px 18px rgba(0,0,0,.4); }
  .brand{ display:flex; align-items:center; gap:8px; color:#cfc7bd; font-size:12.5px; flex:none; }
  .brand .hip{ font-size:20px; }
  .tools{ display:flex; gap:2px; flex:1; justify-content:center; overflow-x:auto; }
  .tbtn{ background:none; border:none; color:#e9e5de; display:flex; flex-direction:column;
         align-items:center; gap:2px; padding:5px 9px; border-radius:9px; cursor:pointer; min-width:56px; }
  .tbtn:hover{ background:rgba(255,255,255,.08); }
  .tbtn .ic{ font-size:18px; line-height:1; }
  .tbtn .lb{ font-size:10px; white-space:nowrap; }
  .tbtn.live{ color:var(--green); }
  .leave{ flex:none; background:#d6392e; color:#fff; border:none; border-radius:10px;
          padding:9px 14px; font-size:13px; font-weight:650; cursor:pointer; }
  @media(max-width:560px){ .brand .nm{ display:none; } .tbtn{ min-width:46px; padding:5px 6px; } }

  .toast{ position:fixed; left:50%; bottom:74px; transform:translateX(-50%) translateY(8px);
          z-index:5; background:rgba(20,16,12,.92); color:#fff; font-size:12.5px;
          padding:9px 14px; border-radius:11px; max-width:min(420px,88vw); text-align:center;
          opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .metrics{ font-size:12.5px; }
  .metrics .kv{ display:flex; justify-content:space-between; gap:18px; padding:3px 0; }
</style>
</head>
<body>
<div class="room">
  <div class="bg"></div>

  <header class="banner">
    <div class="plaque">
      <div class="t">The Hippo Round Table</div>
      <div class="s">🌿 &nbsp;Board Meeting&nbsp; 🌿</div>
    </div>
  </header>

  <div class="status" id="status">Take your seat. Tap any face to hear it — or tap <b>Amanda</b> (you) to go live on your mic.</div>
  <div class="runrow"><button class="run" id="run">▶ Run the table</button></div>
  <div class="bar" id="bar"><i id="barfill"></i></div>

  <main class="stage"><div class="tiles" id="grid"></div></main>

  <footer class="toolbar">
    <div class="brand"><span class="hip">🦛</span><span class="nm">Hippo Round Table</span></div>
    <div class="tools">
      <button class="tbtn" id="tb-mute"><span class="ic" id="tb-mute-ic">🔇</span><span class="lb" id="tb-mute-lb">Unmute</span></button>
      <button class="tbtn" id="tb-video"><span class="ic">📹</span><span class="lb">Stop Video</span></button>
      <button class="tbtn" id="tb-share"><span class="ic">🖥️</span><span class="lb">Share Screen</span></button>
      <button class="tbtn" id="tb-parts"><span class="ic">👥</span><span class="lb">Participants</span></button>
      <button class="tbtn" id="tb-chat"><span class="ic">💬</span><span class="lb">Chat</span></button>
      <button class="tbtn" id="tb-more"><span class="ic">⋯</span><span class="lb">More</span></button>
    </div>
    <button class="leave" id="tb-leave">Leave Meeting</button>
  </footer>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { KokoroEngine, SpeechPlayer, MicEngine, FaceRenderer, AbstractRenderer, registerRenderer, startLoop, DEBUG }
  from "./engine.js";
import { ROSTER } from "./roster.js";

const $ = (id) => document.getElementById(id);
const engine = new KokoroEngine();
const player = new SpeechPlayer();
const mic = new MicEngine();        // drives the live 'You' (speak-as-avatar) seat
const grid = $("grid");
const seats = [];
let liveSeat = null;                // the Amanda seat (the 'you' seat)

// short caption role (the bit before the first '·'), tidied for the tile chrome
function shortRole(r){ return (r || "").split("·")[0].trim() || "at the table"; }

for (const cfg of ROSTER) {
  const tile = document.createElement("div");
  tile.className = "tile" + (cfg.live ? " you" : "");
  const frame = document.createElement("div"); frame.className = "frame";
  const canvas = document.createElement("canvas"); canvas.width = canvas.height = 360;
  frame.appendChild(canvas);
  if (cfg.live) { const b = document.createElement("div"); b.className = "badge"; b.textContent = "You · live mic"; frame.appendChild(b); }
  else if (cfg.standin) { const b = document.createElement("div"); b.className = "badge standin"; b.textContent = "stand-in"; frame.appendChild(b); }
  const cap = document.createElement("div"); cap.className = "cap";
  cap.innerHTML = '<span class="mic"></span><span class="txt"><span class="nm"></span><span class="rl"></span></span>';
  cap.querySelector(".nm").textContent = cfg.name;
  cap.querySelector(".rl").textContent = shortRole(cfg.role);
  frame.appendChild(cap);
  tile.appendChild(frame);
  grid.appendChild(tile);

  const renderer = cfg.kind === "abstract" ? new AbstractRenderer(canvas, cfg) : new FaceRenderer(canvas, cfg);
  const seat = { cfg, el: tile, renderer };
  seats.push(seat);
  if (cfg.live) liveSeat = seat;
  // The live seat is mic-driven (toggle on/off); every other seat speaks via TTS.
  tile.onclick = () => (cfg.live ? toggleMic(seat) : speak(seat));
}

// ---- toast helper -------------------------------------------------------------
let toastT = null;
function toast(msg){ const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2600); }

let busy = false, loaded = false;
async function ensureLoaded() {
  if (loaded) return true;
  await player.unlock();
  $("bar").style.display = "block";
  $("status").textContent = "Fetching the shared voice engine (one-time, ~80 MB)…";
  try {
    await engine.load(({ pct }) => { $("barfill").style.width = Math.round(pct * 100) + "%"; });
    $("bar").style.display = "none";
    loaded = true; return true;
  } catch (e) {
    $("bar").style.display = "none";
    $("status").textContent = "Voice failed to load: " + (e && e.message ? e.message : e);
    return false;
  }
}

async function speak(seat) {
  if (busy) return;
  if (!(await ensureLoaded())) return;
  busy = true;
  seats.forEach((s) => s.el.classList.toggle("on", s === seat));
  $("status").textContent = seat.cfg.name + " is finding their voice…";
  try {
    const r = await engine.generate(seat.cfg.line, seat.cfg.voice);
    $("status").textContent = seat.cfg.name + " is speaking…";
    seat.renderer.setLevelFn(() => player.sample());
    await player.play(r.audio, r.sr);
  } catch (e) {
    $("status").textContent = "Couldn't speak — " + (e && e.message ? e.message : e);
  } finally {
    seat.renderer.setLevelFn(() => 0);
    seat.el.classList.remove("on");
    busy = false;
    $("status").textContent = "Tap any face to hear it again — or tap Amanda to go live on your mic.";
  }
}

// ---- The live 'You' seat: mouth driven by the LIVE MIC, not TTS ---------------
// Tap Amanda's tile OR the toolbar Mute/Unmute button to grant the mic. Fails
// GRACEFULLY: if the mic is unavailable or blocked, the face still shows.
async function toggleMic(seat) {
  if (mic.active && liveSeat === seat) {                 // already live -> turn off
    mic.disable();
    seat.renderer.setLevelFn(() => 0);
    seat.el.classList.remove("live");
    setMuteBtn(false);
    $("status").textContent = "Mic off. Tap your seat (Amanda) to go live again.";
    return;
  }
  $("status").textContent = "Asking for your microphone…";
  const ok = await mic.enable();
  if (!ok) {                                            // graceful fallback
    seat.el.classList.remove("live");
    setMuteBtn(false);
    $("status").textContent = (mic.error === "unsupported"
      ? "This browser can't open a mic here (needs https + mic support). "
      : "Mic permission was blocked — allow it in your browser, then tap again. ")
      + seat.cfg.name + "'s face still shows, just without a live mouth.";
    return;
  }
  seat.el.classList.add("live");
  seat.renderer.setLevelFn(() => mic.sample());         // mic RMS -> top-lip jaw-drop
  setMuteBtn(true);
  $("status").textContent = "You're live — talk, and Amanda's mouth moves with your voice. Tap again to mute.";
}
function setMuteBtn(live){
  const b = $("tb-mute");
  b.classList.toggle("live", live);
  $("tb-mute-ic").textContent = live ? "🎙️" : "🔇";
  $("tb-mute-lb").textContent = live ? "Mute" : "Unmute";
}

// ---- toolbar wiring -----------------------------------------------------------
// Mute/Unmute IS the live-mic toggle for your own seat (Amanda) — the loved
// speak-as-avatar feature, surfaced as the meeting's mic button.
$("tb-mute").onclick = () => { if (liveSeat) toggleMic(liveSeat); };
$("tb-video").onclick = () => toast("This is a voice-first room — your avatar is your video. No camera needed.");
$("tb-share").onclick = () => toast("Preview — screen share isn't wired into the demo yet.");
$("tb-parts").onclick = () => toast(seats.length + " at the table: " + seats.map(s => s.cfg.name).join(", ") + ".");
$("tb-chat").onclick  = () => toast("Preview — meeting chat isn't wired into the demo yet.");
$("tb-more").onclick  = () => toast("Free & open voices: Kokoro-82M, a distinct British-English voice per seat — no per-word cost.");
$("tb-leave").onclick = () => { window.location.href = "./"; };

$("run").onclick = async () => {
  $("run").disabled = true;
  if (!(await ensureLoaded())) { $("run").disabled = false; return; }
  // The live 'You' seat is mic-driven, not TTS — skip it when running the table.
  for (const seat of seats) { if (seat.cfg.live) continue; await speak(seat); }
  $("status").textContent = "That's the table. Tap any face to hear it again — or tap Amanda to go live.";
  $("run").disabled = false;
};

(async () => {
  await Promise.all(seats.map((s) => s.renderer.load()));
  seats.forEach((s) => registerRenderer(s.renderer));
  startLoop();
  if (DEBUG) { window.__seats = seats; window.__mic = mic; }  // handles for headless verification
})();
</script>
</body>
</html>
