<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2a1d12" />
<link rel="icon" type="image/png" href="favicon-32.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>The Hippo Round Table — Board Meeting</title>
<style>
  :root{ --green:#39d07e; --gold:#ffd27a; --wall:#c8a877; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ margin:0; color:#2a2118; overflow:hidden;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif; line-height:1.4;
        /* warm wall tone fills any letterbox around the landscape room */
        background:radial-gradient(120% 90% at 50% 12%, #e8d3ad 0%, #c9a877 52%, #9c7a4e 100%); }

  .wrap{ height:100%; display:flex; flex-direction:column; }

  /* ---- slim control header: status + Run the table ---------------------- */
  .topbar{ position:relative; flex:none; display:flex; align-items:center; gap:10px; padding:7px 12px;
           background:rgba(38,26,14,.30); color:#fff5e2;
           border-bottom:1px solid rgba(20,12,4,.25); }
  .status{ flex:1; min-width:0; font-size:12.5px; text-shadow:0 1px 2px rgba(0,0,0,.45);
           overflow:hidden; }
  .status b{ color:#ffe6b0; }
  .run{ flex:none; background:#5b7b4e; color:#fff; border:none; border-radius:999px;
        padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer;
        box-shadow:0 3px 10px rgba(20,40,15,.4); }
  .run:disabled{ opacity:.55; }
  .bar{ position:absolute; left:12px; right:12px; bottom:-3px; height:3px;
        background:rgba(255,255,255,.18); border-radius:3px; overflow:hidden; display:none; }
  .bar>i{ display:block; height:100%; width:0; background:var(--green); transition:width .2s; }

  /* ---- the room (the finished render) + live talking-face overlays ------- */
  .stagewrap{ position:relative; flex:1; display:flex; align-items:center; justify-content:center;
              overflow:hidden; padding:0; }
  .stage{ position:relative; width:100%; max-width:min(1180px, calc((100vh - 132px) * 1.6769));
          aspect-ratio:1536 / 916; margin:0 auto;
          box-shadow:0 10px 30px rgba(20,12,4,.5); }
  /* blur-up placeholder: tiny inline image, instantly visible, sharpens on load */
  .stage .lqip, .stage .bg{ position:absolute; inset:0; width:100%; height:100%;
          object-fit:fill; display:block; }
  .stage .lqip{ filter:blur(8px); transform:scale(1.04); }
  .stage .bg{ opacity:0; transition:opacity .35s ease; }
  .stage .bg.ready{ opacity:1; }

  /* each seat is a live <canvas> pinned exactly over its baked portrait */
  canvas.seat{ position:absolute; display:block; cursor:pointer;
               border-radius:7px; transition:box-shadow .15s, transform .1s; }
  canvas.seat:active{ transform:scale(.985); }
  canvas.seat.on{ box-shadow:0 0 0 3px rgba(255,210,120,.95), 0 6px 18px rgba(18,11,4,.5); }
  canvas.seat.live{ box-shadow:0 0 0 3px var(--green); animation:liveglow 1.1s ease-in-out infinite; }
  @keyframes liveglow{ 0%,100%{ box-shadow:0 0 0 2px var(--green); }
                       50%{ box-shadow:0 0 0 6px rgba(57,208,126,.5); } }

  /* ---- Zoom-style meeting toolbar (real + interactive) ------------------ */
  .toolbar{ flex:none; display:flex; align-items:center; gap:6px;
            padding:7px 10px calc(7px + env(safe-area-inset-bottom)); background:#1f1c19;
            border-top:1px solid #000; box-shadow:0 -6px 18px rgba(0,0,0,.45); }
  .brand{ display:flex; align-items:center; gap:8px; color:#cfc7bd; font-size:12.5px; flex:none; }
  .brand .hip{ font-size:20px; }
  .tools{ display:flex; gap:2px; flex:1; justify-content:center; overflow-x:auto; }
  .tbtn{ background:none; border:none; color:#e9e5de; display:flex; flex-direction:column;
         align-items:center; gap:2px; padding:5px 9px; border-radius:9px; cursor:pointer; min-width:56px; }
  .tbtn:hover{ background:rgba(255,255,255,.08); }
  .tbtn .ic{ font-size:18px; line-height:1; }
  .tbtn .lb{ font-size:10px; white-space:nowrap; }
  .tbtn.live{ color:var(--green); }
  .leave{ flex:none; background:#d6392e; color:#fff; border:none; border-radius:10px;
          padding:9px 14px; font-size:13px; font-weight:650; cursor:pointer; }
  @media(max-width:560px){ .brand .nm{ display:none; } .tbtn{ min-width:46px; padding:5px 6px; } }

  .toast{ position:fixed; left:50%; bottom:78px; transform:translateX(-50%) translateY(8px);
          z-index:9; background:rgba(20,16,12,.92); color:#fff; font-size:12.5px;
          padding:9px 14px; border-radius:11px; max-width:min(420px,88vw); text-align:center;
          opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <div class="status" id="status">Welcome to the boardroom. Tap any face to hear it — or tap <b>Amanda</b> (you) to go live on your mic.</div>
    <button class="run" id="run">▶ Run the table</button>
    <div class="bar" id="bar"><i id="barfill"></i></div>
  </header>

  <div class="stagewrap">
    <div class="stage" id="stage">
      <img class="lqip" alt="" src="data:image/webp;base64,UklGRhABAABXRUJQVlA4IAQBAABwBwCdASooABgAPrVOn0unJCKhqrgMAOAWiWIAnTLG/69HgTr+0wLvPGEFy0kCTN9Po7XmTEeHZjXUSzH73gPPhCn4QAD98HXqwvy1T4OuA7KkbxF0Z5puAunLhW7U2lddUuU9Y7pd8nstpB1Cj2OxyLXwp65tMcdHPXwApkOyQVLvQyL6blymHeH3bi6BERYRxc/LgntLTc+rpc6f7QpHiTzlP55v0EmqJ7XRX0BSolAtdCN4tTdE0o6TKB1vGw2N3uBwxpqvFlOb9Fm1oA/Qv/zaWGZAlI215KiL9Yg3WQUl1hds6R6/iwFKptspEzMKB+e+ToVmQzoHoVl5dHYb9EAAAA==" />
      <!-- The finished boardroom render. Every talking-face canvas crops straight
           out of THIS image (one shared decode). webp with a jpg fallback. -->
      <picture>
        <source srcset="room.webp" type="image/webp" />
        <img class="bg" id="bg" alt="The Hippo Round Table boardroom" src="room.jpg" />
      </picture>
      <!-- 12 seat canvases are injected here, over their baked portraits -->
    </div>
  </div>

  <footer class="toolbar">
    <div class="brand"><span class="hip">🦛</span><span class="nm">Hippo Round Table</span></div>
    <div class="tools">
      <button class="tbtn" id="tb-mute"><span class="ic" id="tb-mute-ic">🔇</span><span class="lb" id="tb-mute-lb">Unmute</span></button>
      <button class="tbtn" id="tb-video"><span class="ic">📹</span><span class="lb">Stop Video</span></button>
      <button class="tbtn" id="tb-share"><span class="ic">🖥️</span><span class="lb">Share Screen</span></button>
      <button class="tbtn" id="tb-parts"><span class="ic">👥</span><span class="lb">Participants</span></button>
      <button class="tbtn" id="tb-chat"><span class="ic">💬</span><span class="lb">Chat</span></button>
      <button class="tbtn" id="tb-more"><span class="ic">⋯</span><span class="lb">More</span></button>
    </div>
    <button class="leave" id="tb-leave">Leave Meeting</button>
  </footer>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { KokoroEngine, SpeechPlayer, MicEngine, FaceRenderer, AbstractRenderer, registerRenderer, startLoop, DEBUG }
  from "./engine.js";
import { ROSTER } from "./roster.js";

const $ = (id) => document.getElementById(id);
const engine = new KokoroEngine();
const player = new SpeechPlayer();
const mic = new MicEngine();          // drives the live 'Amanda' (speak-as-avatar) seat
const stage = $("stage");
const seats = [];
let liveSeat = null;

// Build a live talking-canvas for every seat, pinned over its baked portrait.
for (const cfg of ROSTER) {
  const cv = document.createElement("canvas");
  cv.className = "seat" + (cfg.live ? " you" : "");
  const c = cfg.crop;
  cv.style.left   = (c.x * 100) + "%";
  cv.style.top    = (c.y * 100) + "%";
  cv.style.width  = (c.w * 100) + "%";
  cv.style.height = (c.h * 100) + "%";
  cv.title = cfg.name + " — " + cfg.role;
  stage.appendChild(cv);

  const renderer = cfg.kind === "abstract" ? new AbstractRenderer(cv, cfg) : new FaceRenderer(cv, cfg);
  const seat = { cfg, el: cv, renderer };
  seats.push(seat);
  if (cfg.live) liveSeat = seat;
  cv.onclick = () => (cfg.live ? toggleMic(seat) : speak(seat));
}

// ---- toast --------------------------------------------------------------------
let toastT = null;
function toast(msg){ const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2600); }

let busy = false, loaded = false;
async function ensureLoaded() {
  if (loaded) return true;
  await player.unlock();
  $("bar").style.display = "block";
  $("status").textContent = "Fetching the shared voice engine (one-time, ~80 MB)…";
  try {
    await engine.load(({ pct }) => { $("barfill").style.width = Math.round(pct * 100) + "%"; });
    $("bar").style.display = "none";
    loaded = true; return true;
  } catch (e) {
    $("bar").style.display = "none";
    $("status").textContent = "Voice failed to load: " + (e && e.message ? e.message : e);
    return false;
  }
}

async function speak(seat) {
  if (busy) return;
  if (!(await ensureLoaded())) return;
  busy = true;
  seats.forEach((s) => s.el.classList.toggle("on", s === seat));
  $("status").textContent = seat.cfg.name + " is finding their voice…";
  try {
    const r = await engine.generate(seat.cfg.line, seat.cfg.voice);
    $("status").textContent = seat.cfg.name + " is speaking…";
    seat.renderer.setLevelFn(() => player.sample());
    await player.play(r.audio, r.sr);
  } catch (e) {
    $("status").textContent = "Couldn't speak — " + (e && e.message ? e.message : e);
  } finally {
    seat.renderer.setLevelFn(() => 0);
    seat.el.classList.remove("on");
    busy = false;
    $("status").textContent = "Tap any face to hear it again — or tap Amanda to go live on your mic.";
  }
}

// ---- The live 'Amanda' seat: mouth driven by the LIVE MIC, not TTS -----------
async function toggleMic(seat) {
  if (mic.active && liveSeat === seat) {
    mic.disable();
    seat.renderer.setLevelFn(() => 0);
    seat.el.classList.remove("live");
    setMuteBtn(false);
    $("status").textContent = "Mic off. Tap your seat (Amanda) to go live again.";
    return;
  }
  $("status").textContent = "Asking for your microphone…";
  const ok = await mic.enable();
  if (!ok) {
    seat.el.classList.remove("live");
    setMuteBtn(false);
    $("status").textContent = (mic.error === "unsupported"
      ? "This browser can't open a mic here (needs https + mic support). "
      : "Mic permission was blocked — allow it in your browser, then tap again. ")
      + seat.cfg.name + "'s face still shows, just without a live mouth.";
    return;
  }
  seat.el.classList.add("live");
  seat.renderer.setLevelFn(() => mic.sample());
  setMuteBtn(true);
  $("status").textContent = "You're live — talk, and Amanda's mouth moves with your voice. Tap again to mute.";
}
function setMuteBtn(live){
  const b = $("tb-mute");
  b.classList.toggle("live", live);
  $("tb-mute-ic").textContent = live ? "🎙️" : "🔇";
  $("tb-mute-lb").textContent = live ? "Mute" : "Unmute";
}

// ---- toolbar wiring -----------------------------------------------------------
$("tb-mute").onclick  = () => { if (liveSeat) toggleMic(liveSeat); };
$("tb-video").onclick = () => toast("This is a voice-first room — your avatar is your video. No camera needed.");
$("tb-share").onclick = () => toast("Preview — screen share isn't wired into the demo yet.");
$("tb-parts").onclick = () => toast(seats.length + " at the table: " + seats.map(s => s.cfg.name).join(", ") + ".");
$("tb-chat").onclick  = () => toast("Preview — meeting chat isn't wired into the demo yet.");
$("tb-more").onclick  = () => toast("Free & open British voices: Kokoro-82M, a distinct voice per seat — no per-word cost.");
$("tb-leave").onclick = () => { window.location.href = "./"; };

$("run").onclick = async () => {
  $("run").disabled = true;
  if (!(await ensureLoaded())) { $("run").disabled = false; return; }
  for (const seat of seats) { if (seat.cfg.live) continue; await speak(seat); }
  $("status").textContent = "That's the table. Tap any face to hear it again — or tap Amanda to go live.";
  $("run").disabled = false;
};

// ---- boot: the inlined room <img> IS the shared source — crop every face from it
(async () => {
  const room = $("bg");
  if (!room.complete || !room.naturalWidth) {
    await new Promise((res) => { room.onload = res; room.onerror = res; });
  }
  room.classList.add("ready");
  await Promise.all(seats.map((s) => s.renderer.load(room)));
  seats.forEach((s) => registerRenderer(s.renderer));
  startLoop();
  if (DEBUG) { window.__seats = seats; window.__mic = mic; }
})();
</script>
</body>
</html>
